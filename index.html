<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASCII Aquarium</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100svh;
            min-height: 100dvh;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            background: #050505;
            color: #4a9eff;
            font-family: "Space Mono", "Courier New", Courier, monospace;
            overflow: hidden;
        }

        .stage {
            position: relative;
            flex: 1;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            overflow: hidden;
        }

        pre {
            position: absolute;
            margin: 0;
            padding: 0;
            line-height: 1;
            font-size: clamp(10px, 1.5vw, 16px);
            white-space: pre;
            overflow: hidden;
            letter-spacing: 0;
        }

        #periods {
            inset: 0;
            color: #2b7dff;
            will-change: background-position, transform;
        }

        @supports ((-webkit-background-clip: text) or (background-clip: text)) {
            #periods {
                color: transparent;
                background-image:
                    radial-gradient(circle at 20% 30%, rgba(120, 220, 255, 0.95), transparent 45%),
                    radial-gradient(circle at 80% 65%, rgba(30, 110, 255, 0.9), transparent 50%),
                    linear-gradient(180deg, #7fe7ff 0%, #2b7dff 40%, #0b2b7a 100%);
                background-size: 120% 120%, 140% 140%, 100% 200%;
                background-position: 0% 0%, 100% 100%, 50% 0%;
                -webkit-background-clip: text;
                background-clip: text;
            }
        }

        .entity {
            color: #ffffff;
            inset: auto;
            top: 0;
            left: 0;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.25);
        }

        .entity-link {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            pointer-events: auto;
            text-decoration: none;
            cursor: pointer;
            --shadow-color: rgba(255, 25, 243, 0.705);
            --shadow-hover-color: rgba(0, 244, 252, 0.795);
        }

        .entity-link .entity {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .entity-link .entity-shadow {
            color: var(--shadow-color);
            text-shadow: 0 0 10px var(--shadow-color);
            opacity: 1;
            transform: translate(5px, 5px);
        }

        .entity-link:hover .entity-shadow {
            color: var(--shadow-hover-color);
        }

        .ui {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top));
            left: calc(12px + env(safe-area-inset-left));
            z-index: 9999;
            pointer-events: none;
        }

        .ui-right {
            left: auto;
            right: calc(12px + env(safe-area-inset-right));
        }

        .ui > * {
            pointer-events: auto;
        }

        .site-map-btn {
            appearance: none;
            border: 1px solid rgba(74, 158, 255, 0.4);
            background: rgba(5, 5, 5, 0.7);
            color: #b9dcff;
            font: inherit;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            position: relative;
            z-index: 10000;
        }

        .site-map-btn:hover {
            border-color: rgba(74, 158, 255, 0.75);
            color: #e4f1ff;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            align-items: flex-start;
            justify-content: flex-start;
            padding: calc(56px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
            background: rgba(0, 0, 0, 0.55);
        }

        .modal-backdrop.is-open {
            display: flex;
        }

        .modal {
            width: min(360px, calc(100vw - 24px));
            border: 1px solid rgba(74, 158, 255, 0.35);
            background: rgba(5, 5, 5, 0.9);
            border-radius: 14px;
            padding: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .modal-title {
            font-weight: 700;
            color: #e4f1ff;
        }

        .modal-close {
            appearance: none;
            border: 1px solid rgba(74, 158, 255, 0.35);
            background: transparent;
            color: #b9dcff;
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            font: inherit;
        }

        .modal-close:hover {
            border-color: rgba(74, 158, 255, 0.75);
            color: #e4f1ff;
        }

        .modal a {
            color: #b9dcff;
            text-decoration: none;
        }

        .modal a:hover {
            text-decoration: underline;
            color: #e4f1ff;
        }

        .modal ul {
            margin: 0;
            padding-left: 1.25rem;
        }

        .modal li {
            margin: 6px 0;
        }

        .modal-iframe {
            width: min(760px, calc(100vw - 24px));
        }

        .modal-iframe-frame {
            width: 100%;
            height: 450px;
            border: 0;
            background: transparent;
        }

        .entity-popup-window {
            position: fixed;
            z-index: 80;
            pointer-events: auto;
            will-change: transform;
            transform: translate(0, 0);
        }

        .entity-popup-window .modal-header {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .entity-popup-window.is-dragging {
            user-select: none;
        }

        .entity-popup-window.is-dragging .modal-header {
            cursor: grabbing;
        }

        .entity-popup-window.is-dragging iframe {
            pointer-events: none;
        }
    </style>
</head>

<div class="ui">
    <button class="site-map-btn" id="siteMapBtn" type="button">site map</button>
</div>

<div class="ui ui-right">
    <div class="site-map-btn" id="fishPoints" aria-live="polite">fishi points 0</div>
</div>

<div class="modal-backdrop" id="siteMapModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="site map">
        <div class="modal-header">
            <div class="modal-title">site map</div>
            <button class="modal-close" id="siteMapClose" type="button">close</button>
        </div>
        <ul>
            <li><a href="#" id="siteMapChatBtn">chat</a></li>
            <li><a href="guestbook.html" target="_blank" rel="noopener noreferrer">guestbook</a></li>
            <li><a href="mealprep.html" target="_blank" rel="noopener noreferrer">meal prep</a></li>
        </ul>
    </div>
</div>

<div id="entityPopupsContainer"></div>

<!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->

<div class="stage" aria-hidden="true">
    <pre id="periods"></pre>
    <!-- Entity overlays will be appended here by JS -->
</div>

<script>
(function() {
    const stage = document.querySelector('.stage');
    const dotsPre = document.getElementById('periods');

    let resizeRaf;
    let cols = 0;
    let rows = 0;
    let charWidth = 8;
    let charHeight = 16;

    let speedBoostUntilMs = 0;

    function speedFactor() {
        return (speedBoostUntilMs && performance.now() < speedBoostUntilMs) ? 2 : 1;
    }

    function scaledDelay(ms) {
        return ms / speedFactor();
    }

    const fishes = [];
    const vehicles = [];
    const plants = [];
    const rocks = [];
    const pellets = [];

    let fishPoints = 0;

    function measureCharSize() {
        const probe = document.createElement('span');
        probe.textContent = '.';
        probe.style.visibility = 'hidden';
        dotsPre.appendChild(probe);
        const rect = probe.getBoundingClientRect();
        const computedLineHeight = parseFloat(getComputedStyle(dotsPre).lineHeight);
        probe.remove();
        return {
            width: rect.width || 8,
            height: computedLineHeight || rect.height || 16
        };
    }

    function fillDots() {
        const bounds = stage.getBoundingClientRect();
        const measured = measureCharSize();
        charWidth = measured.width;
        charHeight = measured.height;

        const overscan = 4;
        cols = Math.max(1, Math.ceil(bounds.width / charWidth) + overscan);
        rows = Math.max(1, Math.ceil(bounds.height / charHeight) + overscan);

        const line = '.'.repeat(cols);
        dotsPre.textContent = Array(rows).fill(line).join('\n');
    }

    function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
    }

    function createOverlay() {
        const pre = document.createElement('pre');
        pre.className = 'entity';
        stage.appendChild(pre);
        return pre;
    }

    function createLinkedOverlay(linkUrl, shadowColor, shadowHoverColor) {
        const a = document.createElement('a');
        a.className = 'entity-link';
        a.href = linkUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        if (shadowColor) a.style.setProperty('--shadow-color', shadowColor);
        if (shadowHoverColor) a.style.setProperty('--shadow-hover-color', shadowHoverColor);

        const shadow = document.createElement('pre');
        shadow.className = 'entity entity-shadow';
        const main = document.createElement('pre');
        main.className = 'entity';

        a.appendChild(shadow);
        a.appendChild(main);
        stage.appendChild(a);

        return { wrap: a, shadow, main };
    }

    function createPopupOverlay(popupIframeUrl, shadowColor, shadowHoverColor, popupTitle) {
        const linked = createLinkedOverlay('#', shadowColor, shadowHoverColor);
        linked.wrap.removeAttribute('target');
        linked.wrap.removeAttribute('rel');
        linked.wrap.setAttribute('role', 'button');
        linked.wrap.setAttribute('aria-label', popupTitle || 'open popup');
        linked.wrap.addEventListener('click', (e) => {
            e.preventDefault();
            openEntityPopup(popupIframeUrl, popupTitle);
        });
        return linked;
    }

    function removePellet(pellet) {
        const idx = pellets.indexOf(pellet);
        if (idx >= 0) pellets.splice(idx, 1);
        if (pellet.el && pellet.el.parentNode) pellet.el.parentNode.removeChild(pellet.el);
    }

    const fishPointsEl = document.getElementById('fishPoints');
    function renderFishPoints() {
        fishPointsEl.textContent = `fishi points ${fishPoints}`;
    }

    function removePelletEatenByFish(pellet) {
        if (!pellets.includes(pellet)) return;
        fishPoints++;
        renderFishPoints();
        removePellet(pellet);
    }

    function loadEntities() {
        const templates = document.querySelectorAll('template.entity');
        templates.forEach(tpl => {
            const type = tpl.dataset.type;
            const jsonScript = tpl.content.querySelector('script[type="application/json"]');
            if (!jsonScript) return;
            let data;
            try {
                data = JSON.parse(jsonScript.textContent);
            } catch (e) {
                console.error('Invalid entity JSON', e);
                return;
            }

            if (type === 'fish') {
                const speedMs = parseInt(tpl.dataset.speedMs, 10) || 80;
                const artLeft = data.artLeft || [];
                const artRight = data.artRight || [];
                const width = Math.max(...artLeft.map(l => l.length), ...artRight.map(l => l.length));
                const height = Math.max(artLeft.length, artRight.length);

                const maxX = Math.max(0, cols - width);
                const maxY = Math.max(0, rows - height);
                const startX = Math.floor(Math.random() * (maxX + 1));
                const startY = Math.floor(Math.random() * (maxY + 1));

                let el;
                let shadowEl;
                let mainEl;
                const popupIframeUrl = tpl.dataset.popupIframe || data.popupIframeUrl;
                const popupTitle = data.popupTitle;
                if (popupIframeUrl) {
                    const linked = createPopupOverlay(popupIframeUrl, data.shadowColor, data.shadowHoverColor, popupTitle);
                    el = linked.wrap;
                    shadowEl = linked.shadow;
                    mainEl = linked.main;
                } else if (data.linkUrl) {
                    const linked = createLinkedOverlay(data.linkUrl, data.shadowColor, data.shadowHoverColor);
                    el = linked.wrap;
                    shadowEl = linked.shadow;
                    mainEl = linked.main;
                } else {
                    el = createOverlay();
                }

                fishes.push({
                    artLeft,
                    artRight,
                    width,
                    height,
                    speedMs,
                    x: startX,
                    y: startY,
                    tx: startX,
                    ty: startY,
                    goingRight: false,
                    el,
                    shadowEl,
                    mainEl
                });
            } else if (type === 'vehicle') {
                const speedMs = parseInt(tpl.dataset.speedMs, 10) || 80;
                const artLeft = data.artLeft || [];
                const artRight = data.artRight || [];
                const width = Math.max(...artLeft.map(l => l.length), ...artRight.map(l => l.length));
                const height = Math.max(artLeft.length, artRight.length);

                const maxX = Math.max(0, cols - width);
                const maxY = Math.max(0, rows - height);
                const startX = Math.floor(Math.random() * (maxX + 1));
                const startY = Math.floor(Math.random() * (maxY + 1));

                let el;
                let shadowEl;
                let mainEl;
                const popupIframeUrl = tpl.dataset.popupIframe || data.popupIframeUrl;
                const popupTitle = data.popupTitle;
                if (popupIframeUrl) {
                    const linked = createPopupOverlay(popupIframeUrl, data.shadowColor, data.shadowHoverColor, popupTitle);
                    el = linked.wrap;
                    shadowEl = linked.shadow;
                    mainEl = linked.main;
                } else if (data.linkUrl) {
                    const linked = createLinkedOverlay(data.linkUrl, data.shadowColor, data.shadowHoverColor);
                    el = linked.wrap;
                    shadowEl = linked.shadow;
                    mainEl = linked.main;
                } else {
                    el = createOverlay();
                }

                vehicles.push({
                    artLeft,
                    artRight,
                    width,
                    height,
                    speedMs,
                    x: startX,
                    y: startY,
                    tx: startX,
                    ty: startY,
                    goingRight: false,
                    el,
                    shadowEl,
                    mainEl
                });
            } else if (type === 'plant') {
                const x = parseInt(tpl.dataset.x, 10) || 0;
                const yOffset = parseInt(tpl.dataset.yOffset, 10) || 0;
                const stateA = data.stateA || [];
                const stateB = data.stateB || [];
                const height = Math.max(stateA.length, stateB.length);
                const width = Math.max(...stateA.map(l => l.length), ...stateB.map(l => l.length));

                let el;
                let shadowEl;
                let mainEl;
                const popupIframeUrl = tpl.dataset.popupIframe || data.popupIframeUrl;
                const popupTitle = data.popupTitle;
                if (popupIframeUrl) {
                    const linked = createPopupOverlay(popupIframeUrl, data.shadowColor, data.shadowHoverColor, popupTitle);
                    el = linked.wrap;
                    shadowEl = linked.shadow;
                    mainEl = linked.main;
                } else if (data.linkUrl) {
                    const linked = createLinkedOverlay(data.linkUrl, data.shadowColor, data.shadowHoverColor);
                    el = linked.wrap;
                    shadowEl = linked.shadow;
                    mainEl = linked.main;
                } else {
                    el = createOverlay();
                }

                plants.push({
                    stateA,
                    stateB,
                    height,
                    width,
                    x,
                    yOffset,
                    currentState: false,
                    el,
                    shadowEl,
                    mainEl
                });
            } else if (type === 'rock') {
                const x = parseInt(tpl.dataset.x, 10) || 0;
                const yOffset = parseInt(tpl.dataset.yOffset, 10) || 0;
                const art = data.art || [];
                const height = art.length;
                rocks.push({
                    art,
                    height,
                    x,
                    yOffset,
                    el: createOverlay()
                });
            }
        });
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function normalizeCssColorToken(token) {
        const t = String(token || '').trim();
        if (!t) return null;
        if (/^#[0-9a-fA-F]{3,8}$/.test(t)) return t;
        if (/^[a-zA-Z]+$/.test(t)) return t;
        if (/^rgba?\([^\)]+\)$/.test(t)) return t;
        return null;
    }

    function parseInlineColorMarkup(line) {
        const src = String(line ?? '');
        let out = '';
        let i = 0;
        const stack = [];

        while (i < src.length) {
            const openIdx = src.indexOf('[[', i);
            if (openIdx === -1) {
                out += escapeHtml(src.slice(i));
                break;
            }

            out += escapeHtml(src.slice(i, openIdx));
            const closeIdx = src.indexOf(']]', openIdx + 2);
            if (closeIdx === -1) {
                out += escapeHtml(src.slice(openIdx));
                break;
            }

            const tag = src.slice(openIdx + 2, closeIdx).trim();
            i = closeIdx + 2;

            if (tag === '/') {
                if (stack.length) {
                    stack.pop();
                    out += '</span>';
                } else {
                    out += escapeHtml('[[]]');
                }
                continue;
            }

            const color = normalizeCssColorToken(tag);
            if (!color) {
                out += escapeHtml(`[[${tag}]]`);
                continue;
            }

            stack.push(color);
            out += `<span style="color: ${escapeHtml(color)}">`;
        }

        while (stack.length) {
            stack.pop();
            out += '</span>';
        }

        return out;
    }

    function artLinesToHtml(lines) {
        return (lines || []).map(parseInlineColorMarkup).join('\n');
    }

    function renderFish(fish) {
        const art = fish.goingRight ? fish.artRight : fish.artLeft;
        if (fish.shadowEl) {
            const html = artLinesToHtml(art);
            fish.shadowEl.innerHTML = html;
            fish.mainEl.innerHTML = html;

            const hitW = fish.width * charWidth;
            const hitH = fish.height * charHeight;
            fish.el.style.width = `${hitW}px`;
            fish.el.style.height = `${hitH}px`;
        } else {
            fish.el.innerHTML = artLinesToHtml(art);
        }
        fish.el.style.transform = `translate(${fish.x * charWidth}px, ${fish.y * charHeight}px)`;
    }

    function renderPellet(pellet) {
        pellet.el.textContent = '[x]';
        pellet.el.style.transform = `translate(${pellet.x * charWidth}px, ${pellet.y * charHeight}px)`;
    }

    function pelletTouchesFish(pellet) {
        const px0 = pellet.x;
        const px1 = pellet.x + pellet.width - 1;
        const py0 = pellet.y;
        const py1 = pellet.y + pellet.height - 1;

        for (let i = 0; i < fishes.length; i++) {
            const f = fishes[i];
            const fx0 = f.x;
            const fx1 = f.x + f.width - 1;
            const fy0 = f.y;
            const fy1 = f.y + f.height - 1;
            const overlap = !(px1 < fx0 || px0 > fx1 || py1 < fy0 || py0 > fy1);
            if (overlap) return true;
        }
        return false;
    }

    function startPelletAnimation(pellet) {
        function tick() {
            if (!pellets.includes(pellet)) return;

            pellet.y++;

            if (pellet.y >= rows - pellet.height) {
                removePellet(pellet);
                return;
            }

            if (pelletTouchesFish(pellet)) {
                removePelletEatenByFish(pellet);
                return;
            }

            renderPellet(pellet);
            setTimeout(() => requestAnimationFrame(tick), scaledDelay(pellet.fallMs));
        }

        renderPellet(pellet);
        setTimeout(() => requestAnimationFrame(tick), scaledDelay(pellet.fallMs));
    }

    function spawnPelletAtClientPoint(clientX, clientY) {
        const bounds = stage.getBoundingClientRect();
        const localX = clientX - bounds.left;
        const localY = clientY - bounds.top;

        const pellet = {
            width: 3,
            height: 1,
            x: clamp(Math.floor(localX / charWidth), 0, Math.max(0, cols - 3)),
            y: clamp(Math.floor(localY / charHeight), 0, Math.max(0, rows - 1)),
            fallMs: 70,
            el: createOverlay()
        };

        pellets.push(pellet);
        startPelletAnimation(pellet);
    }

    function getSwimmers() {
        return fishes.concat(vehicles);
    }

    function moveSwimmer(swimmer) {
        if (swimmer.x === swimmer.tx && swimmer.y === swimmer.ty) {
            const maxX = Math.max(0, cols - swimmer.width - 1);
            const maxY = Math.max(0, rows - swimmer.height - 1);
            swimmer.tx = Math.floor(Math.random() * (maxX + 1));
            swimmer.ty = Math.floor(Math.random() * (maxY + 1));
        }

        let desireX = swimmer.tx - swimmer.x;
        let desireY = swimmer.ty - swimmer.y;

        const centerX = swimmer.x + swimmer.width / 2;
        const centerY = swimmer.y + swimmer.height / 2;

        let repulseX = 0;
        let repulseY = 0;
        const avoidRadius = 7;

        getSwimmers().forEach(other => {
            if (other === swimmer) return;
            const otherCenterX = other.x + other.width / 2;
            const otherCenterY = other.y + other.height / 2;
            const dx = centerX - otherCenterX;
            const dy = centerY - otherCenterY;
            const dist = Math.hypot(dx, dy);
            if (!dist || dist > avoidRadius) return;
            const strength = (avoidRadius - dist) / avoidRadius;
            repulseX += (dx / dist) * strength;
            repulseY += (dy / dist) * strength;
        });

        const steerX = desireX + repulseX * 6;
        const steerY = desireY + repulseY * 6;

        const stepX = steerX === 0 ? 0 : (steerX > 0 ? 1 : -1);
        const stepY = steerY === 0 ? 0 : (steerY > 0 ? 1 : -1);

        if (Math.abs(steerX) >= Math.abs(steerY)) {
            swimmer.x = clamp(swimmer.x + stepX, 0, Math.max(0, cols - swimmer.width));
            if (stepY !== 0 && Math.random() < 0.35) {
                swimmer.y = clamp(swimmer.y + stepY, 0, Math.max(0, rows - swimmer.height));
            }
        } else {
            swimmer.y = clamp(swimmer.y + stepY, 0, Math.max(0, rows - swimmer.height));
            if (stepX !== 0 && Math.random() < 0.35) {
                swimmer.x = clamp(swimmer.x + stepX, 0, Math.max(0, cols - swimmer.width));
            }
        }

        swimmer.goingRight = stepX > 0;
        renderFish(swimmer);
    }

    function moveFish(fish) {
        moveSwimmer(fish);
    }

    function moveVehicle(vehicle) {
        moveSwimmer(vehicle);
    }

    function renderPlant(plant) {
        const art = plant.currentState ? plant.stateB : plant.stateA;
        const y = rows - plant.height - plant.yOffset;
        if (plant.shadowEl) {
            const html = artLinesToHtml(art);
            plant.shadowEl.innerHTML = html;
            plant.mainEl.innerHTML = html;

            const hitW = plant.width * charWidth;
            const hitH = plant.height * charHeight;
            plant.el.style.width = `${hitW}px`;
            plant.el.style.height = `${hitH}px`;
        } else {
            plant.el.textContent = art.join('\n');
        }
        plant.el.style.transform = `translate(${plant.x * charWidth}px, ${Math.max(0, y) * charHeight}px)`;
    }

    function renderRock(rock) {
        const y = rows - rock.height - rock.yOffset;
        rock.el.textContent = rock.art.join('\n');
        rock.el.style.transform = `translate(${rock.x * charWidth}px, ${Math.max(0, y) * charHeight}px)`;
    }

    function renderAllEntities() {
        fishes.forEach(f => {
            f.x = clamp(f.x, 0, Math.max(0, cols - f.width));
            f.y = clamp(f.y, 0, Math.max(0, rows - f.height));
            f.tx = clamp(f.tx, 0, Math.max(0, cols - f.width));
            f.ty = clamp(f.ty, 0, Math.max(0, rows - f.height));
            renderFish(f);
        });
        vehicles.forEach(v => {
            v.x = clamp(v.x, 0, Math.max(0, cols - v.width));
            v.y = clamp(v.y, 0, Math.max(0, rows - v.height));
            v.tx = clamp(v.tx, 0, Math.max(0, cols - v.width));
            v.ty = clamp(v.ty, 0, Math.max(0, rows - v.height));
            renderFish(v);
        });
        plants.forEach(renderPlant);
        rocks.forEach(renderRock);
        pellets.slice().forEach(p => {
            p.x = clamp(p.x, 0, Math.max(0, cols - p.width));
            p.y = clamp(p.y, 0, Math.max(0, rows - p.height));
            if (p.y >= rows - p.height) {
                removePellet(p);
                return;
            }
            if (pelletTouchesFish(p)) {
                removePelletEatenByFish(p);
                return;
            }
            renderPellet(p);
        });
    }

    function startFishAnimation(fish) {
        function tick() {
            moveFish(fish);
            setTimeout(() => requestAnimationFrame(tick), scaledDelay(fish.speedMs));
        }
        setTimeout(tick, scaledDelay(Math.random() * 500));
    }

    function startVehicleAnimation(vehicle) {
        function tick() {
            moveVehicle(vehicle);
            setTimeout(() => requestAnimationFrame(tick), scaledDelay(vehicle.speedMs));
        }
        setTimeout(tick, scaledDelay(Math.random() * 500));
    }

    function startPlantAnimation(plant) {
        function toggle() {
            plant.currentState = !plant.currentState;
            renderPlant(plant);
            setTimeout(toggle, scaledDelay(500 + Math.random() * 700));
        }
        setTimeout(toggle, scaledDelay(Math.random() * 1000));
    }

    function queueFill() {
        cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(() => {
            fillDots();
            renderAllEntities();
        });
    }

    window.addEventListener('resize', queueFill);
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', queueFill);
        window.visualViewport.addEventListener('scroll', queueFill);
    }
    window.addEventListener('load', () => {
        speedBoostUntilMs = performance.now() + 1000;
        renderFishPoints();
        fillDots();
        loadEntities();
        renderAllEntities();
        fishes.forEach(startFishAnimation);
        vehicles.forEach(startVehicleAnimation);
        plants.forEach(startPlantAnimation);
    });

    stage.addEventListener('click', (e) => {
        if (e.target && e.target.closest && e.target.closest('.entity-link')) return;
        if (e.target && e.target.closest && e.target.closest('.entity-popup-window')) return;
        spawnPelletAtClientPoint(e.clientX, e.clientY);
    });

    const siteMapBtn = document.getElementById('siteMapBtn');
    const siteMapModal = document.getElementById('siteMapModal');
    const siteMapClose = document.getElementById('siteMapClose');
    const siteMapChatBtn = document.getElementById('siteMapChatBtn');

    function openSiteMap() {
        siteMapModal.classList.add('is-open');
        siteMapModal.setAttribute('aria-hidden', 'false');
    }

    function closeSiteMap() {
        siteMapModal.classList.remove('is-open');
        siteMapModal.setAttribute('aria-hidden', 'true');
    }

    siteMapBtn.addEventListener('click', () => {
        if (siteMapModal.classList.contains('is-open')) closeSiteMap();
        else openSiteMap();
    });

    siteMapClose.addEventListener('click', closeSiteMap);

    siteMapModal.addEventListener('click', (e) => {
        if (e.target === siteMapModal) closeSiteMap();
    });

    siteMapChatBtn.addEventListener('click', (e) => {
        e.preventDefault();
        openEntityPopup('https://www3.cbox.ws/box/?boxid=3552838&boxtag=zm436D', 'chat');
        closeSiteMap();
    });

    const popupsContainer = document.getElementById('entityPopupsContainer');
    const activePopups = [];
    let popupIdCounter = 0;
    let popupStackOffset = 0;

    function openEntityPopup(iframeUrl, title) {
        const popupId = ++popupIdCounter;
        const offsetX = 12 + (popupStackOffset % 5) * 30;
        const offsetY = 56 + (popupStackOffset % 5) * 30;
        popupStackOffset++;

        const popup = document.createElement('div');
        popup.className = 'modal modal-iframe entity-popup-window';
        popup.setAttribute('role', 'dialog');
        popup.setAttribute('aria-modal', 'true');
        popup.setAttribute('data-popup-id', popupId);
        popup.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

        popup.innerHTML = `
            <div class="modal-header">
                <div class="modal-title">${escapeHtml(title || 'popup')}</div>
                <button class="modal-close" type="button">close</button>
            </div>
            <iframe
                class="modal-iframe-frame"
                src="${escapeHtml(iframeUrl)}"
                allowtransparency="yes"
                allow="autoplay"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                scrolling="auto"></iframe>
        `;

        popupsContainer.appendChild(popup);

        const header = popup.querySelector('.modal-header');
        const closeBtn = popup.querySelector('.modal-close');
        const iframe = popup.querySelector('iframe');

        const state = {
            id: popupId,
            el: popup,
            header,
            iframe,
            dragging: false,
            currentX: offsetX,
            currentY: offsetY,
            startX: 0,
            startY: 0,
            startTransX: 0,
            startTransY: 0
        };

        activePopups.push(state);

        function bringToFront() {
            const maxZ = activePopups.reduce((max, p) => {
                const z = parseInt(getComputedStyle(p.el).zIndex, 10) || 80;
                return Math.max(max, z);
            }, 80);
            popup.style.zIndex = maxZ + 1;
        }

        function closePopup() {
            const idx = activePopups.findIndex(p => p.id === popupId);
            if (idx >= 0) activePopups.splice(idx, 1);
            iframe.src = 'about:blank';
            popup.remove();
        }

        closeBtn.addEventListener('click', closePopup);

        popup.addEventListener('pointerdown', bringToFront);

        function onPointerDown(e) {
            if (e.button != null && e.button !== 0) return;
            if (e.target.closest('button, a, input, textarea, select')) return;

            state.dragging = true;
            popup.classList.add('is-dragging');
            header.setPointerCapture(e.pointerId);

            state.startX = e.clientX;
            state.startY = e.clientY;
            state.startTransX = state.currentX;
            state.startTransY = state.currentY;

            bringToFront();
            e.preventDefault();
        }

        function onPointerMove(e) {
            if (!state.dragging) return;

            const dx = e.clientX - state.startX;
            const dy = e.clientY - state.startY;

            let nextX = state.startTransX + dx;
            let nextY = state.startTransY + dy;

            const maxX = Math.max(0, window.innerWidth - popup.offsetWidth);
            const maxY = Math.max(0, window.innerHeight - popup.offsetHeight);

            nextX = Math.max(0, Math.min(nextX, maxX));
            nextY = Math.max(0, Math.min(nextY, maxY));

            state.currentX = nextX;
            state.currentY = nextY;
            popup.style.transform = `translate(${nextX}px, ${nextY}px)`;
        }

        function onPointerUp(e) {
            if (!state.dragging) return;
            state.dragging = false;
            popup.classList.remove('is-dragging');
            try { header.releasePointerCapture(e.pointerId); } catch (_) {}
        }

        header.addEventListener('pointerdown', onPointerDown);
        header.addEventListener('pointermove', onPointerMove);
        header.addEventListener('pointerup', onPointerUp);
        header.addEventListener('pointercancel', onPointerUp);

        bringToFront();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeSiteMap();
        }
    });
})();
</script>
