<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kickalt</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* ── Carousel container ── */
        #homeCarousel {
            display: flex;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        #homeCarousel::-webkit-scrollbar {
            display: none;
        }

        /* ── Each unit (one per page) ── */
        .carousel-unit {
            flex: 0 0 100%;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            scroll-snap-align: start;
            overflow: hidden;
        }

        .carousel-unit iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* ── Arrow overlay ──
           pointer-events: none on wrapper so iframes stay fully interactive;
           only the buttons themselves are clickable.                          */
        #arrowOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-arrow {
            pointer-events: auto;
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.14);
            padding: 24px 14px;
            line-height: 1;
            transition: color 0.18s ease, background 0.18s ease;
            border-radius: 0;
            outline-offset: 4px;
        }

        .nav-arrow:hover:not(:disabled) {
            color: rgba(255, 255, 255, 0.93);
            background: rgba(0, 0, 0, 0.28);
        }

        .nav-arrow:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.7);
        }

        .nav-arrow:disabled {
            opacity: 0;
            pointer-events: none;
        }

        .nav-arrow svg {
            display: block;
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.55));
        }
    </style>
</head>
<body>

<div id="homeCarousel">

    <!-- ═══════════════════════════════════════════════════════════════════
         CAROUSEL UNITS
         To add a new page: copy a .carousel-unit block, set data-hash to a
         short unique slug, and point the iframe src at your new page.
         ═══════════════════════════════════════════════════════════════════ -->

    <section class="carousel-unit" data-hash="fish">
        <iframe src="index.html" title="ASCII Aquarium" loading="eager"></iframe>
    </section>

    <section class="carousel-unit" data-hash="neighbors">
        <iframe src="neighbors.html" title="Net Neighbors" loading="lazy"></iframe>
    </section>

</div>

<!-- Arrow navigation overlay -->
<div id="arrowOverlay">
    <button class="nav-arrow" id="arrowLeft" aria-label="Previous page" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <button class="nav-arrow" id="arrowRight" aria-label="Next page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>
</div>

<script>
(function () {
    const carousel  = document.getElementById('homeCarousel');
    const btnLeft   = document.getElementById('arrowLeft');
    const btnRight  = document.getElementById('arrowRight');
    const units     = Array.from(document.querySelectorAll('.carousel-unit'));
    const count     = units.length;

    let activeIndex = 0;

    /* ── Hash <=> index maps ─────────────────────────────────────────────── */
    const hashToIndex = {};
    units.forEach(function (unit, i) {
        const h = unit.dataset.hash;
        if (h) hashToIndex[h] = i;
    });

    function indexToHash(i) {
        return units[i] ? (units[i].dataset.hash || String(i)) : String(i);
    }

    /* ── Button state ──────────────────────────────────────────────────── */
    function updateButtons() {
        btnLeft.disabled  = activeIndex === 0;
        btnRight.disabled = activeIndex === count - 1;
    }

    /* ── Scroll to a unit ──────────────────────────────────────────────── */
    function scrollToIndex(index, pushHistory) {
        if (index < 0 || index >= count) return;
        activeIndex = index;
        carousel.scrollTo({ left: index * carousel.clientWidth, behavior: 'smooth' });
        updateButtons();
        const hash = '#' + indexToHash(index);
        if (window.location.hash !== hash) {
            if (pushHistory !== false) {
                history.pushState(null, '', hash);
            } else {
                history.replaceState(null, '', hash);
            }
        }
    }

    /* ── Detect snap position after user swipe / trackpad ─────────────── */
    let scrollTimer;
    carousel.addEventListener('scroll', function () {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(function () {
            const vw  = carousel.clientWidth;
            const idx = Math.round(carousel.scrollLeft / vw);
            if (idx !== activeIndex) {
                activeIndex = idx;
                updateButtons();
                const hash = '#' + indexToHash(activeIndex);
                if (window.location.hash !== hash) {
                    history.replaceState(null, '', hash);
                }
            }
        }, 80);
    }, { passive: true });

    /* ── Arrow clicks ──────────────────────────────────────────────────── */
    btnLeft.addEventListener('click',  function () { scrollToIndex(activeIndex - 1); });
    btnRight.addEventListener('click', function () { scrollToIndex(activeIndex + 1); });

    /* ── Keyboard ──────────────────────────────────────────────────────── */
    document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowRight') { e.preventDefault(); scrollToIndex(activeIndex + 1); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); scrollToIndex(activeIndex - 1); }
    });

    /* ── Keep position correct after resize ────────────────────────────── */
    window.addEventListener('resize', function () {
        carousel.scrollTo({ left: activeIndex * carousel.clientWidth, behavior: 'instant' });
    });

    /* ── Browser back / forward ────────────────────────────────────────── */
    window.addEventListener('popstate', function () {
        const h   = window.location.hash.replace('#', '');
        const idx = hashToIndex[h] !== undefined ? hashToIndex[h] : 0;
        scrollToIndex(idx, false);
    });

    /* ── Init from URL hash ────────────────────────────────────────────── */
    (function initFromHash() {
        const h   = window.location.hash.replace('#', '');
        const idx = hashToIndex[h] !== undefined ? hashToIndex[h] : 0;
        if (idx > 0) {
            /* Instant jump on load — no history entry needed */
            carousel.scrollLeft = idx * carousel.clientWidth;
            activeIndex = idx;
        }
        updateButtons();
        /* Ensure hash reflects actual position */
        const correctHash = '#' + indexToHash(activeIndex);
        if (window.location.hash !== correctHash) {
            history.replaceState(null, '', correctHash);
        }
    }());
}());
</script>

</body>
</html>
