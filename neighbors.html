<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Neighbors - Detective Board</title>
    <style>
        :root {
            --cork-light: #c9a66b;
            --cork-dark: #8b6914;
            --pin-red: #c41e3a;
            --string-red: #8b0000;
            --wood-frame: #5c3d2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "Courier New", Courier, monospace;
        }

        .board-viewport {
            position: fixed;
            inset: 0;
            overflow: hidden;
            cursor: grab;
        }

        .board-viewport.is-dragging {
            cursor: grabbing;
        }

        .cork-board {
            position: absolute;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.03) 2px,
                    rgba(0,0,0,0.03) 4px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.03) 2px,
                    rgba(0,0,0,0.03) 4px
                ),
                linear-gradient(135deg, var(--cork-light) 0%, var(--cork-dark) 50%, var(--cork-light) 100%);
            border: 12px solid var(--wood-frame);
            box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
            will-change: transform;
        }

        .string-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .string-line {
            stroke: var(--string-red);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.3));
        }

        .button-card {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            transition: transform 0.2s ease;
        }

        .button-card:hover {
            z-index: 100;
        }

        .button-card:hover .button-frame {
            transform: scale(1.1);
        }

        .pin {
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, var(--pin-red) 60%, #8b0000);
            border-radius: 50%;
            box-shadow: 
                2px 2px 4px rgba(0,0,0,0.4),
                inset -1px -1px 2px rgba(0,0,0,0.3);
            position: relative;
            z-index: 3;
        }

        .button-frame {
            background: #fff;
            padding: 4px;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.4);
            margin-top: -4px;
            transition: transform 0.2s ease;
        }

        .button-frame img {
            display: block;
            width: 88px;
            height: 31px;
            image-rendering: pixelated;
        }

        .copy-section {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
        }

        .copy-section details {
            background: rgba(40, 30, 20, 0.95);
            border: 3px solid var(--wood-frame);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .copy-section summary {
            padding: 10px 15px;
            cursor: pointer;
            color: var(--pin-red);
            font-size: 0.9rem;
            font-weight: bold;
            list-style: none;
            user-select: none;
        }

        .copy-section summary::-webkit-details-marker {
            display: none;
        }

        .copy-section summary::before {
            content: '▶ ';
            font-size: 0.7rem;
        }

        .copy-section details[open] summary::before {
            content: '▼ ';
        }

        .copy-section summary:hover {
            color: #ff6b6b;
        }

        .copy-section-content {
            padding: 0 15px 15px 15px;
            color: #f0e6d3;
            max-width: 320px;
        }

        .copy-section img {
            image-rendering: pixelated;
            margin-bottom: 8px;
        }

        .copy-section textarea {
            width: 100%;
            height: 60px;
            background: #1a1a1a;
            color: #4a9eff;
            border: 1px solid #444;
            padding: 8px;
            font-family: "Courier New", monospace;
            font-size: 0.7rem;
            resize: none;
        }

        .ez-read-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(40, 30, 20, 0.95);
            border: 3px solid var(--wood-frame);
            border-radius: 8px;
            padding: 10px 15px;
            z-index: 200;
            color: #b9dcff;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .ez-read-btn:hover {
            color: #fff;
            border-color: var(--pin-red);
        }

        .ez-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ez-modal-backdrop.is-open {
            display: flex;
        }

        .ez-modal {
            background: rgba(40, 30, 20, 0.98);
            border: 4px solid var(--wood-frame);
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        .ez-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--wood-frame);
        }

        .ez-modal-header h2 {
            color: var(--pin-red);
            font-size: 1.2rem;
            margin: 0;
        }

        .ez-modal-close {
            background: none;
            border: 2px solid var(--wood-frame);
            border-radius: 6px;
            color: #b9dcff;
            padding: 5px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .ez-modal-close:hover {
            color: #fff;
            border-color: var(--pin-red);
        }

        .ez-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .ez-grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .ez-grid-item img {
            image-rendering: pixelated;
            border: 2px solid #fff;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }

        .ez-grid-item:hover img {
            border-color: var(--pin-red);
        }
    </style>
</head>
<body>
    <div class="board-viewport" id="boardViewport">
        <div class="cork-board" id="corkBoard">
            <svg class="string-svg" id="stringSvg"></svg>
            <!-- Buttons will be generated from templates -->
        </div>
    </div>

    <button class="ez-read-btn" id="ezReadBtn">EZ READ MODE</button>

    <div class="ez-modal-backdrop" id="ezModal">
        <div class="ez-modal">
            <div class="ez-modal-header">
                <h2>📋 All Neighbors</h2>
                <button class="ez-modal-close" id="ezModalClose">close</button>
            </div>
            <div class="ez-grid" id="ezGrid">

            </div>

    </div>

    <div class="copy-section">
        <details>
            <summary>📌 Grab My Button!</summary>
            <div class="copy-section-content">
                <img src="neighborbutton.gif" alt="Kick's Button" width="88" height="31">
                <textarea readonly onclick="this.select()">&lt;a href="https://kickalt.neocities.org" target="_blank"&gt;&lt;img src="https://kickalt.neocities.org/neighborbutton.gif" alt="Kick" width="88" height="31"&gt;&lt;/a&gt;</textarea>
            </div>
        </details>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════════════
         NEIGHBOR BUTTON TEMPLATES
         
         To add a new button:
         1. Copy a template block below
         2. Set data-id to a unique identifier
         3. Set data-x and data-y for position (percentage of board)
         4. Set data-rotation for angle (-30 to 30 degrees)
         5. Set data-connects-to with comma-separated IDs of buttons to connect to
         6. Update the JSON with href, imgSrc, alt, and title
         ═══════════════════════════════════════════════════════════════════════════ -->

    <!-- Mrmister -->
    <template class="neighbor-button" data-id="mrmister" data-connects-to="onio">
        <script type="application/json">
        {
            "href": "https://mrmister.neocities.org/",
            "imgSrc": "https://mrmister.neocities.org/donotclickthebutton.png",
            "alt": "Mrmister's Empty Place",
            "title": "The website of Mrmister"
        }
        </script>

    <script>
        (function() {
            const corkBoard = document.getElementById('corkBoard');
            const stringSvg = document.getElementById('stringSvg');
            const templates = document.querySelectorAll('template.neighbor-button');
            const buttonElements = {};

            // ═══════════════════════════════════════════════════════════════
            // DYNAMIC BOARD SIZING - always bigger than viewport
            // ═══════════════════════════════════════════════════════════════
            function sizeBoardToViewport() {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                // Board is 50% larger than viewport in each dimension
                const bw = Math.max(vw * 1.5, 1200);
                const bh = Math.max(vh * 1.5, 900);
                corkBoard.style.width = bw + 'px';
                corkBoard.style.height = bh + 'px';
                return { bw, bh };
            }
            const boardSize = sizeBoardToViewport();

            // ═══════════════════════════════════════════════════════════════
            // RANDOM POSITIONING for buttons without explicit coordinates
            // Adjust SCATTER_RADIUS to control how far buttons spread from center
            // ═══════════════════════════════════════════════════════════════
            const usedPositions = [];
            const BUTTON_SPACING = 10; // Minimum % distance between buttons
            const SCATTER_RADIUS = 25; // Max % distance from center (adjustable)

            function getRandomPosition(centerX, centerY, radius) {
                // Generate position within radius of center, avoiding overlaps
                // Dynamically expand radius if needed
                let currentRadius = radius;
                let attempts = 0;
                while (attempts < 100) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = currentRadius * 0.3 + Math.random() * currentRadius * 0.7;
                    const x = centerX + Math.cos(angle) * dist;
                    const y = centerY + Math.sin(angle) * dist;
                    
                    // Clamp to safe bounds (15-85%)
                    const clampedX = Math.max(15, Math.min(85, x));
                    const clampedY = Math.max(15, Math.min(85, y));
                    
                    // Check for overlaps
                    let overlaps = false;
                    for (const pos of usedPositions) {
                        const dx = pos.x - clampedX;
                        const dy = pos.y - clampedY;
                        if (Math.sqrt(dx*dx + dy*dy) < BUTTON_SPACING) {
                            overlaps = true;
                            break;
                        }
                    }
                    
                    if (!overlaps) {
                        usedPositions.push({ x: clampedX, y: clampedY });
                        return { x: clampedX, y: clampedY };
                    }
                    attempts++;
                    // Expand search radius every 20 attempts
                    if (attempts % 20 === 0) {
                        currentRadius += 5;
                    }
                }
                // Fallback: find first non-overlapping spot by grid search
                for (let fy = 20; fy <= 80; fy += BUTTON_SPACING) {
                    for (let fx = 20; fx <= 80; fx += BUTTON_SPACING) {
                        let overlaps = false;
                        for (const pos of usedPositions) {
                            const dx = pos.x - fx;
                            const dy = pos.y - fy;
                            if (Math.sqrt(dx*dx + dy*dy) < BUTTON_SPACING) {
                                overlaps = true;
                                break;
                            }
                        }
                        if (!overlaps) {
                            usedPositions.push({ x: fx, y: fy });
                            return { x: fx, y: fy };
                        }
                    }
                }
                // Ultimate fallback (should never reach)
                const fallbackX = 15 + Math.random() * 70;
                const fallbackY = 15 + Math.random() * 70;
                usedPositions.push({ x: fallbackX, y: fallbackY });
                return { x: fallbackX, y: fallbackY };
            }

            function getRandomRotation() {
                return (Math.random() - 0.5) * 60; // -30 to +30 degrees
            }

            // Parse and create buttons from templates
            templates.forEach(template => {
                const id = template.dataset.id;
                const isHub = template.dataset.isHub === 'true';
                const hasExplicitPos = template.dataset.x !== undefined && template.dataset.y !== undefined;
                const connectsTo = template.dataset.connectsTo ? template.dataset.connectsTo.split(',').filter(Boolean) : [];

                let x, y, rotation;

                if (hasExplicitPos) {
                    // Use explicit coordinates
                    x = parseFloat(template.dataset.x);
                    y = parseFloat(template.dataset.y);
                    rotation = parseFloat(template.dataset.rotation) || 0;
                    usedPositions.push({ x, y });
                } else {
                    // Random position near center
                    const pos = getRandomPosition(50, 50, SCATTER_RADIUS);
                    x = pos.x;
                    y = pos.y;
                    rotation = getRandomRotation();
                }

                const jsonScript = template.content.querySelector('script[type="application/json"]');
                const data = JSON.parse(jsonScript.textContent);

                // Create button card
                const card = document.createElement('div');
                card.className = 'button-card';
                card.style.left = `${x}%`;
                card.style.top = `${y}%`;
                card.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
                card.dataset.id = id;
                card.dataset.connectsTo = connectsTo.join(',');

                card.innerHTML = `
                    <div class="pin"></div>
                    <a href="${data.href}" target="_blank" rel="noopener noreferrer" title="${data.title}">
                        <div class="button-frame">
                            <img src="${data.imgSrc}" alt="${data.alt}" width="88" height="31">
                        </div>
                    </a>
                `;

                corkBoard.appendChild(card);
                buttonElements[id] = card;
            });

            // Draw strings connecting to actual pin positions
            function drawStrings() {
                const boardRect = corkBoard.getBoundingClientRect();
                stringSvg.innerHTML = '';

                Object.entries(buttonElements).forEach(([id, card]) => {
                    const connectsTo = card.dataset.connectsTo ? card.dataset.connectsTo.split(',').filter(Boolean) : [];
                    const pin = card.querySelector('.pin');
                    const pinRect = pin.getBoundingClientRect();
                    
                    // Get center of this pin relative to board
                    const x1 = pinRect.left - boardRect.left + pinRect.width / 2;
                    const y1 = pinRect.top - boardRect.top + pinRect.height / 2;

                    connectsTo.forEach(targetId => {
                        const targetCard = buttonElements[targetId];
                        if (!targetCard) return;

                        const targetPin = targetCard.querySelector('.pin');
                        const targetPinRect = targetPin.getBoundingClientRect();
                        
                        // Get center of target pin relative to board
                        const x2 = targetPinRect.left - boardRect.left + targetPinRect.width / 2;
                        const y2 = targetPinRect.top - boardRect.top + targetPinRect.height / 2;

                        // Calculate sag based on distance
                        const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
                        const sag = Math.min(dist * 0.1, 30);

                        const midX = (x1 + x2) / 2;
                        const midY = (y1 + y2) / 2 + sag;

                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M ${x1} ${y1} Q ${midX} ${midY} ${x2} ${y2}`);
                        path.setAttribute('class', 'string-line');
                        stringSvg.appendChild(path);
                    });
                });
            }

            // Draw strings on load and resize
            setTimeout(drawStrings, 100);
            window.addEventListener('resize', drawStrings);

            // ═══════════════════════════════════════════════════════════════
            // DRAG TO PAN (mouse + touch)
            // ═══════════════════════════════════════════════════════════════
            const viewport = document.getElementById('boardViewport');
            let isDragging = false;
            let startX, startY, scrollLeft, scrollTop;

            // Center the board initially and resize board on window resize
            function centerBoard() {
                sizeBoardToViewport();
                const vw = viewport.clientWidth;
                const vh = viewport.clientHeight;
                const bw = corkBoard.offsetWidth;
                const bh = corkBoard.offsetHeight;
                scrollLeft = (bw - vw) / 2;
                scrollTop = (bh - vh) / 2;
                corkBoard.style.transform = `translate(${-scrollLeft}px, ${-scrollTop}px)`;
                drawStrings();
            }
            centerBoard();
            window.addEventListener('resize', centerBoard);

            function startDrag(e) {
                // Don't drag if clicking on interactive elements
                if (e.target.closest('a, button, textarea, details, .back-link, .copy-section')) return;
                
                isDragging = true;
                viewport.classList.add('is-dragging');
                
                const point = e.touches ? e.touches[0] : e;
                startX = point.clientX;
                startY = point.clientY;
            }

            function doDrag(e) {
                if (!isDragging) return;
                e.preventDefault();
                
                const point = e.touches ? e.touches[0] : e;
                const dx = point.clientX - startX;
                const dy = point.clientY - startY;
                
                startX = point.clientX;
                startY = point.clientY;
                
                // Update scroll position with bounds
                const vw = viewport.clientWidth;
                const vh = viewport.clientHeight;
                const bw = corkBoard.offsetWidth;
                const bh = corkBoard.offsetHeight;
                
                scrollLeft = Math.max(0, Math.min(bw - vw, scrollLeft - dx));
                scrollTop = Math.max(0, Math.min(bh - vh, scrollTop - dy));
                
                corkBoard.style.transform = `translate(${-scrollLeft}px, ${-scrollTop}px)`;
            }

            function endDrag() {
                if (isDragging) {
                    isDragging = false;
                    viewport.classList.remove('is-dragging');
                    drawStrings();
                }
            }

            // Mouse events
            viewport.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', doDrag);
            window.addEventListener('mouseup', endDrag);

            // Touch events
            viewport.addEventListener('touchstart', startDrag, { passive: true });
            viewport.addEventListener('touchmove', doDrag, { passive: false });
            viewport.addEventListener('touchend', endDrag);

            // ═══════════════════════════════════════════════════════════════
            // EZ READ MODE MODAL
            // ═══════════════════════════════════════════════════════════════
            const ezReadBtn = document.getElementById('ezReadBtn');
            const ezModal = document.getElementById('ezModal');
            const ezModalClose = document.getElementById('ezModalClose');
            const ezGrid = document.getElementById('ezGrid');

            // Populate grid from templates
            templates.forEach(template => {
                const jsonScript = template.content.querySelector('script[type="application/json"]');
                const data = JSON.parse(jsonScript.textContent);

                const item = document.createElement('a');
                item.className = 'ez-grid-item';
                item.href = data.href;
                item.target = '_blank';
                item.rel = 'noopener noreferrer';
                item.title = data.title;
                item.innerHTML = `<img src="${data.imgSrc}" alt="${data.alt}" width="88" height="31">`;
                ezGrid.appendChild(item);
            });

            ezReadBtn.addEventListener('click', () => {
                ezModal.classList.add('is-open');
            });

            ezModalClose.addEventListener('click', () => {
                ezModal.classList.remove('is-open');
            });

            ezModal.addEventListener('click', (e) => {
                if (e.target === ezModal) {
                    ezModal.classList.remove('is-open');
                }
            });
        })();
    </script>
</body>
</html>
