<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>split view</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #split {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        .pane {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        /* thin divider between panes on desktop */
        .pane + .pane {
            border-left: 1px solid rgba(255, 255, 255, 0.12);
        }

        .pane-scaler {
            position: absolute;
            inset: 0;
        }

        .pane-scaler iframe {
            display: block;
            border: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* ── Mobile: stack top / bottom ─────────────────────────────────── */
        @media (max-width: 900px) {
            #split {
                flex-direction: column;
            }

            .pane + .pane {
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.12);
            }
        }
    </style>
</head>
<body>

<div id="split">
    <div class="pane" id="paneLeft">
        <div class="pane-scaler" id="scalerLeft">
            <iframe
                src="Hand/index.html"
                title="Hand"
                scrolling="no"
                allowtransparency="yes"
                frameborder="0"
                marginheight="0"
                marginwidth="0"></iframe>
        </div>
    </div>

    <div class="pane" id="paneRight">
        <div class="pane-scaler" id="scalerRight">
            <iframe
                src="Artificial/index.html"
                title="Artificial"
                scrolling="no"
                allowtransparency="yes"
                frameborder="0"
                marginheight="0"
                marginwidth="0"></iframe>
        </div>
    </div>
</div>

<script>
(function () {
    function hideIframeScrollbars(iframe) {
        try {
            var doc = iframe.contentDocument;
            if (!doc) return;
            if (doc.getElementById('splitViewNoScroll')) return;

            var style = doc.createElement('style');
            style.id = 'splitViewNoScroll';
            style.textContent = 'html, body { width: 100% !important; height: 100% !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; }' +
                'body { overscroll-behavior: none !important; }' +
                '*::-webkit-scrollbar { width: 0 !important; height: 0 !important; }';

            var mount = doc.head || doc.documentElement;
            if (mount) mount.appendChild(style);

            doc.documentElement.style.overflow = 'hidden';
            doc.documentElement.style.height = '100%';
            doc.body && (doc.body.style.overflow = 'hidden');
            doc.body && (doc.body.style.height = '100%');
        } catch (e) {
            /* ignore cross-origin errors */
        }
    }

    var iframes = Array.from(document.querySelectorAll('iframe'));
    iframes.forEach(function (iframe) {
        iframe.addEventListener('load', function () {
            hideIframeScrollbars(iframe);
        });
    });
}());
</script>

</body>
</html>
