<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASCII Aquarium</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100svh;
            min-height: 100dvh;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            background: #050505;
            color: #4a9eff;
            font-family: "Space Mono", "Courier New", Courier, monospace;
            overflow: hidden;
        }

        .stage {
            position: relative;
            flex: 1;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            overflow: hidden;
        }

        pre {
            position: absolute;
            margin: 0;
            padding: 0;
            line-height: 1;
            font-size: clamp(10px, 1.5vw, 16px);
            white-space: pre;
            overflow: hidden;
            letter-spacing: 0;
        }

        #periods {
            inset: 0;
            color: #2b7dff;
            will-change: background-position, transform;
        }

        @supports ((-webkit-background-clip: text) or (background-clip: text)) {
            #periods {
                color: transparent;
                background-image:
                    radial-gradient(circle at 20% 30%, rgba(120, 220, 255, 0.95), transparent 45%),
                    radial-gradient(circle at 80% 65%, rgba(30, 110, 255, 0.9), transparent 50%),
                    linear-gradient(180deg, #7fe7ff 0%, #2b7dff 40%, #0b2b7a 100%);
                background-size: 120% 120%, 140% 140%, 100% 200%;
                background-position: 0% 0%, 100% 100%, 50% 0%;
                -webkit-background-clip: text;
                background-clip: text;
            }
        }

        .entity {
            color: #ffffff;
            inset: auto;
            top: 0;
            left: 0;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.25);
        }

        .entity-link {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            pointer-events: auto;
            text-decoration: none;
            cursor: pointer;
            --shadow-color: rgba(255, 25, 243, 0.705);
            --shadow-hover-color: rgba(0, 244, 252, 0.795);
        }

        .entity-link .entity {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .entity-link .entity-shadow {
            color: var(--shadow-color);
            text-shadow: 0 0 10px var(--shadow-color);
            opacity: 1;
            transform: translate(5px, 5px);
        }

        .entity-link:hover .entity-shadow {
            color: var(--shadow-hover-color);
        }

        .ui {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top));
            left: calc(12px + env(safe-area-inset-left));
            z-index: 9999;
            pointer-events: none;
        }

        .ui-right {
            left: auto;
            right: calc(12px + env(safe-area-inset-right));
        }

        .ui > * {
            pointer-events: auto;
        }

        .ui-stack {
            display: flex;
            flex-direction: row;
            gap: 8px;
        }

        .site-map-btn {
            appearance: none;
            border: 1px solid rgba(74, 158, 255, 0.4);
            background: rgba(5, 5, 5, 0.7);
            color: #b9dcff;
            font: inherit;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            position: relative;
            z-index: 10000;
        }

        .site-map-btn:hover {
            border-color: rgba(74, 158, 255, 0.75);
            color: #e4f1ff;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            align-items: flex-start;
            justify-content: flex-start;
            padding: calc(56px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
            background: rgba(0, 0, 0, 0.55);
        }

        .modal-backdrop.is-open {
            display: flex;
        }

        .modal {
            width: min(360px, calc(100vw - 24px));
            border: 1px solid rgba(74, 158, 255, 0.35);
            background: rgba(5, 5, 5, 0.9);
            border-radius: 14px;
            padding: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .modal-title {
            font-weight: 700;
            color: #e4f1ff;
        }

        .modal-close {
            appearance: none;
            border: 1px solid rgba(74, 158, 255, 0.35);
            background: transparent;
            color: #b9dcff;
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            font: inherit;
        }

        .modal-close:hover {
            border-color: rgba(74, 158, 255, 0.75);
            color: #e4f1ff;
        }

        .modal a {
            color: #b9dcff;
            text-decoration: none;
        }

        .modal a:hover {
            text-decoration: underline;
            color: #e4f1ff;
        }

        .modal ul {
            margin: 0;
            padding-left: 1.25rem;
        }

        .modal li {
            margin: 6px 0;
        }

        .terminal-output {
            border: 1px solid rgba(74, 158, 255, 0.25);
            border-radius: 10px;
            padding: 8px 10px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.25);
            min-height: 72px;
            font-size: 12px;
            color: #b9dcff;
            white-space: pre-wrap;
        }

        .terminal-row {
            display: flex;
            gap: 8px;
        }

        .terminal-input {
            flex: 1;
            appearance: none;
            border: 1px solid rgba(74, 158, 255, 0.35);
            background: rgba(0, 0, 0, 0.2);
            color: #e4f1ff;
            font: inherit;
            padding: 8px 10px;
            border-radius: 10px;
            outline: none;
        }

        .terminal-input:focus {
            border-color: rgba(74, 158, 255, 0.75);
        }

        .modal-iframe {
            width: min(760px, calc(100vw - 24px));
        }

        .modal-iframe-frame {
            width: 100%;
            height: 450px;
            min-height: 100px;
            border: 0;
            background: transparent;
            display: block;
        }

        .entity-popup-window.modal-iframe {
            display: flex;
            flex-direction: column;
        }

        .entity-popup-window.modal-iframe .modal-iframe-frame {
            flex: 1;
            height: 0;
        }

        .entity-popup-window {
            position: fixed;
            z-index: 80;
            pointer-events: auto;
            will-change: transform;
            transform: translate(0, 0);
            resize: both;
            overflow: hidden;
            min-width: 220px;
            min-height: 120px;
        }

        .entity-popup-window .modal-header {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .entity-popup-window.is-dragging {
            user-select: none;
        }

        .entity-popup-window.is-dragging .modal-header {
            cursor: grabbing;
        }

        .entity-popup-window.is-dragging iframe,
        .entity-popup-window.is-resizing iframe {
            pointer-events: none;
        }

        #fishSpeechTooltip {
            position: fixed;
            z-index: 500;
            pointer-events: none;
            white-space: pre;
            font-family: "Space Mono", "Courier New", Courier, monospace;
            font-size: clamp(10px, 1.2vw, 13px);
            color: #e4f1ff;
            background: rgba(5, 5, 5, 0.88);
            border: 1px solid rgba(74, 158, 255, 0.45);
            border-radius: 6px;
            padding: 4px 10px;
            transform: translateX(-50%);
            display: none;
            width: max-content;
            max-width: calc(100vw - 24px);
            text-align: center;
            line-height: 1.4;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        @keyframes unlockToastRise {
            0%   { transform: translateX(-50%) translateY(0);      opacity: 1; }
            15%  { transform: translateX(-50%) translateY(-8px);   opacity: 1; }
            75%  { transform: translateX(-50%) translateY(-38vh);  opacity: 1; }
            100% { transform: translateX(-50%) translateY(-55vh);  opacity: 0; }
        }

        #unlockToast {
            position: fixed;
            bottom: calc(24px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(0);
            z-index: 9500;
            pointer-events: none;
            background: rgba(5, 5, 5, 0.92);
            border: 1px solid rgba(74, 158, 255, 0.55);
            border-radius: 12px;
            padding: 14px 24px;
            text-align: center;
            color: #e4f1ff;
            font-family: "Space Mono", "Courier New", Courier, monospace;
            font-size: clamp(11px, 1.4vw, 15px);
            display: none;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        #unlockToast.is-animating {
            display: block;
            animation: unlockToastRise 3.2s ease-in forwards;
        }
    </style>
</head>

<!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->

<div class="stage" aria-hidden="true">
    <pre id="periods"></pre>
    <!-- Entity overlays will be appended here by JS -->
</div>

<div id="fishSpeechTooltip" aria-hidden="true"></div>
<div id="unlockToast" aria-live="assertive" aria-atomic="true"></div>

<script>
(function() {
    const stage = document.querySelector('.stage');
    const dotsPre = document.getElementById('periods');

    let resizeRaf;
    let cols = 0;
    let rows = 0;
    let visibleRows = 0;
    let charWidth = 8;
    let charHeight = 16;

    let speedBoostUntilMs = 0;

    function speedFactor() {
        return (speedBoostUntilMs && performance.now() < speedBoostUntilMs) ? 2 : 1;
    }

    function scaledDelay(ms) {
        return ms / speedFactor();
    }

    const fishes = [];
    const vehicles = [];
    const jellies = [];
    const plants = [];
    const rocks = [];
    const pellets = [];

    let fishPoints = 0;

    let fishCanTalkUnlocked = false;

    const UNLOCK_THRESHOLDS = [
        {
            threshold: 25,
            onUnlock() {
                fishCanTalkUnlocked = true;
                showUnlockToast('Fish Can Talk?', 'UNLOCKED!!!');
            }
        }
    ];

    function checkUnlocks(prev, next) {
        for (const u of UNLOCK_THRESHOLDS) {
            if (prev < u.threshold && next >= u.threshold) {
                u.onUnlock();
            }
        }
    }

    function addFishPoints(amount) {
        const prev = fishPoints;
        fishPoints += amount;
        renderFishPoints();
        checkUnlocks(prev, fishPoints);
    }

    // в”Җв”Җ Tuning constants (edit these to adjust behavior) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const SWIM_PROXIMITY_PAD    = 2;    // grid units of desired spacing between bboxes
    const INERTIA_WEIGHT        = 3;    // how strongly swimmers prefer continuing direction
    const TARGET_MIN_DISTANCE   = 10;   // minimum distance when picking new target
    const PELLET_FALL_MS        = 70;   // ms per pellet fall step
    const PELLET_WIDTH          = 3;    // grid columns a pellet occupies
    const PELLET_ART            = '[x]';// what a pellet looks like
    const GRID_OVERSCAN         = 4;    // extra cols/rows beyond viewport
    const SPEED_BOOST_MS        = 1000; // duration of initial speed boost
    const PLANT_SWAY_BASE_MS   = 500;  // min ms between plant sway toggles
    const PLANT_SWAY_RAND_MS   = 700;  // random extra ms added to sway
    const SWIMMER_STAGGER_MS   = 500;  // max random start delay for swimmers
    const TERMINAL_ZONE_X_FRAC = 0.1;  // left fraction of screen for secret zone
    const TERMINAL_ZONE_Y_FRAC = 0.9;  // bottom fraction of screen for secret zone
    const TERMINAL_CLICK_COUNT = 10;   // clicks in zone needed to open terminal
    const POINTS_PER_PELLET    = 1;    // fish points awarded per pellet eaten

    function measureCharSize() {
        const probe = document.createElement('span');
        probe.textContent = '.';
        probe.style.visibility = 'hidden';
        dotsPre.appendChild(probe);
        const rect = probe.getBoundingClientRect();
        const computedLineHeight = parseFloat(getComputedStyle(dotsPre).lineHeight);
        probe.remove();
        return {
            width: rect.width || 8,
            height: computedLineHeight || rect.height || 16
        };
    }

    function fillDots() {
        const bounds = stage.getBoundingClientRect();
        const measured = measureCharSize();
        charWidth = measured.width;
        charHeight = measured.height;

        const overscan = GRID_OVERSCAN;
        cols = Math.max(1, Math.ceil(bounds.width / charWidth) + overscan);
        visibleRows = Math.max(1, Math.ceil(bounds.height / charHeight));
        rows = visibleRows + overscan;

        const line = '.'.repeat(cols);
        dotsPre.textContent = Array(rows).fill(line).join('\n');
    }

    function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
    }

    function createOverlay() {
        const pre = document.createElement('pre');
        pre.className = 'entity';
        stage.appendChild(pre);
        return pre;
    }

    function createLinkedOverlay(linkUrl, shadowColor, shadowHoverColor) {
        const a = document.createElement('a');
        a.className = 'entity-link';
        a.href = linkUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        if (shadowColor) a.style.setProperty('--shadow-color', shadowColor);
        if (shadowHoverColor) a.style.setProperty('--shadow-hover-color', shadowHoverColor);

        const shadow = document.createElement('pre');
        shadow.className = 'entity entity-shadow';
        const main = document.createElement('pre');
        main.className = 'entity';

        a.appendChild(shadow);
        a.appendChild(main);
        stage.appendChild(a);

        return { wrap: a, shadow, main };
    }

    function createPopupOverlay(popupIframeUrl, shadowColor, shadowHoverColor, popupTitle) {
        const linked = createLinkedOverlay('#', shadowColor, shadowHoverColor);
        linked.wrap.removeAttribute('target');
        linked.wrap.removeAttribute('rel');
        linked.wrap.setAttribute('role', 'button');
        linked.wrap.setAttribute('aria-label', popupTitle || 'open popup');
        linked.wrap.addEventListener('click', (e) => {
            e.preventDefault();
            openEntityPopup(popupIframeUrl, popupTitle);
        });
        return linked;
    }

    function createEntityOverlay(tpl, data) {
        const popupIframeUrl = tpl.dataset.popupIframe || data.popupIframeUrl;
        const popupTitle = data.popupTitle;
        if (popupIframeUrl) {
            const linked = createPopupOverlay(popupIframeUrl, data.shadowColor, data.shadowHoverColor, popupTitle);
            return { el: linked.wrap, shadowEl: linked.shadow, mainEl: linked.main };
        }
        if (data.linkUrl) {
            const linked = createLinkedOverlay(data.linkUrl, data.shadowColor, data.shadowHoverColor);
            return { el: linked.wrap, shadowEl: linked.shadow, mainEl: linked.main };

    let fishQuotes = [];

    function parseFishQuotesCsv(text) {
        return text.split('\n')
            .map(l => l.trim())
            .filter(l => l && !l.startsWith('#'))
            .map(l => {
                const ci = l.indexOf(',');
                const linesPart = ci >= 0 ? l.slice(0, ci) : l;
                const restrictedPart = ci >= 0 ? l.slice(ci + 1).trim() : '';
                const lines = linesPart.split('|').map(s => s.trim()).filter(Boolean);
                const restrictedTo = restrictedPart
                    ? restrictedPart.split(';').map(s => s.trim()).filter(Boolean)
                    : [];
                return { lines, restrictedTo };
            })
            .filter(q => q.lines.length > 0);
    }

    function loadFishQuotes() {

            .then(r => r.text())
            .then(text => { fishQuotes = parseFishQuotesCsv(text); })
            .catch(() => {});

    function getEligibleQuotes(swimmer) {
        if (!fishCanTalkUnlocked || swimmer.entityType !== 'fish') return [];
        return fishQuotes.filter(q => {
            if (swimmer.limitedSpeech) {
                return swimmer.specialId != null && q.restrictedTo.includes(swimmer.specialId);
            }
            return q.restrictedTo.length === 0 ||
                   (swimmer.specialId != null && q.restrictedTo.includes(swimmer.specialId));

    function updateFishSpeechTooltip(hoveredSwimmer, bounds) {
        if (!fishCanTalkUnlocked || !hoveredSwimmer || hoveredSwimmer.entityType !== 'fish') {

    function escapeHtml(text) {
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function normalizeCssColorToken(token) {
        const t = String(token || '').trim();
        if (!t) return null;
        if (/^#[0-9a-fA-F]{3,8}$/.test(t)) return t;
        if (/^[a-zA-Z]+$/.test(t)) return t;
        if (/^rgba?\([^\)]+\)$/.test(t)) return t;
        return null;
    }

    function parseInlineColorMarkup(line) {
        const src = String(line ?? '');
        let out = '';
        let i = 0;
        const stack = [];

        while (i < src.length) {
            const openIdx = src.indexOf('[[', i);
            if (openIdx === -1) {
                out += escapeHtml(src.slice(i));
                break;
            }

            out += escapeHtml(src.slice(i, openIdx));
            const closeIdx = src.indexOf(']]', openIdx + 2);
            if (closeIdx === -1) {
                out += escapeHtml(src.slice(openIdx));
                break;
            }

            const tag = src.slice(openIdx + 2, closeIdx).trim();
            i = closeIdx + 2;

            if (tag === '/') {
                if (stack.length) {
                    stack.pop();
                    out += '</span>';
                } else {
                    out += escapeHtml('[[]]');
                }
                continue;
            }

            const color = normalizeCssColorToken(tag);
            if (!color) {
                out += escapeHtml(`[[${tag}]]`);
                continue;
            }

            stack.push(color);
            out += `<span style="color: ${escapeHtml(color)}">`;
        }

        while (stack.length) {
            stack.pop();
            out += '</span>';
        }

        return out;
    }

    function artLinesToHtml(lines) {
        return (lines || []).map(parseInlineColorMarkup).join('\n');
    }

    function renderSwimmer(swimmer) {
        const art = swimmer.goingRight ? swimmer.artRight : swimmer.artLeft;
        const html = artLinesToHtml(art);
        if (swimmer.shadowEl) {

        if (swimmer.ghostEl) {
            const ghostVisible = swimmer.x + swimmer.width > cols || swimmer.x < 0;
            if (ghostVisible) {
                const gx = swimmer.x + swimmer.width > cols ? swimmer.x - cols : swimmer.x + cols;
                if (swimmer.ghostShadowEl) {
                    swimmer.ghostShadowEl.innerHTML = html;
                    swimmer.ghostMainEl.innerHTML = html;
                    swimmer.ghostEl.style.width = `${swimmer.width * charWidth}px`;
                    swimmer.ghostEl.style.height = `${swimmer.height * charHeight}px`;
                } else {
                    swimmer.ghostEl.innerHTML = html;
                }
                swimmer.ghostEl.style.display = '';
                swimmer.ghostEl.style.transform = `translate(${gx * charWidth}px, ${swimmer.y * charHeight}px)`;
            } else {
                swimmer.ghostEl.style.display = 'none';
            }
        }
    }

    function renderPellet(pellet) {

    function pelletTouchesFish(pellet) {
        const px0 = pellet.x;
        const px1 = pellet.x + pellet.width - 1;
        const py0 = pellet.y;
        const py1 = pellet.y + pellet.height - 1;

        const eaters = fishes.concat(jellies);
        for (let i = 0; i < eaters.length; i++) {
            const f = eaters[i];
            const fx0 = f.x;
            const fx1 = f.x + f.width - 1;
            const fy0 = f.y;
            const fy1 = f.y + f.height - 1;
            const overlap = !(px1 < fx0 || px0 > fx1 || py1 < fy0 || py0 > fy1);
            if (overlap) return true;
        }
        return false;
    }

    function startPelletAnimation(pellet) {
        function tick() {
            if (!pellets.includes(pellet)) return;

            pellet.y++;

            if (pellet.y >= rows - pellet.height) {
                removePellet(pellet);
                return;
            }

            if (pelletTouchesFish(pellet)) {
                removePelletEatenByFish(pellet);
                return;
            }

            renderPellet(pellet);
            setTimeout(() => requestAnimationFrame(tick), scaledDelay(pellet.fallMs));
        }

        renderPellet(pellet);
        setTimeout(() => requestAnimationFrame(tick), scaledDelay(pellet.fallMs));
    }

    function spawnPelletAtClientPoint(clientX, clientY) {
        const bounds = stage.getBoundingClientRect();
        const localX = clientX - bounds.left;
        const localY = clientY - bounds.top;

        const pellet = {
            width: PELLET_WIDTH,
            height: 1,
            x: clamp(Math.floor(localX / charWidth), 0, Math.max(0, cols - PELLET_WIDTH)),
            y: clamp(Math.floor(localY / charHeight), 0, Math.max(0, rows - 1)),
            fallMs: PELLET_FALL_MS,
            el: createOverlay()
        };

        pellets.push(pellet);
        startPelletAnimation(pellet);
    }

    function getSwimmers() {
        return fishes.concat(vehicles, jellies);
    }

    function wrapX(x) {
        return ((x % cols) + cols) % cols;
    }

    function moveSwimmer(swimmer) {
        if (swimmer.x === swimmer.tx && swimmer.y === swimmer.ty) {
            const maxX = Math.max(0, cols - swimmer.width - 1);
            const maxY = Math.max(0, visibleRows - swimmer.height - 1);
            for (let i = 0; i < 20; i++) {
                const nx = Math.floor(Math.random() * (maxX + 1));
                const ny = Math.floor(Math.random() * (maxY + 1));
                let dxT = Math.abs(nx - swimmer.x);
                dxT = Math.min(dxT, cols - dxT);
                if (dxT + Math.abs(ny - swimmer.y) >= TARGET_MIN_DISTANCE || i === 19) {
                    swimmer.tx = nx;
                    swimmer.ty = ny;
                    break;
                }
            }
        }

        const candidates = [
            { dx: 0, dy: 0 },
            { dx: -1, dy: 0 },
            { dx: 1, dy: 0 },
            { dx: 0, dy: -1 },
            { dx: 0, dy: 1 }
        ];

        const maxY = Math.max(0, visibleRows - swimmer.height);
        const allSwimmers = getSwimmers();

        let stuck = false;
        for (const o of allSwimmers) {
            if (o === swimmer) continue;
            let relX = o.x - swimmer.x;
            if (relX > cols / 2) relX -= cols;
            if (relX < -cols / 2) relX += cols;
            const xOv = !(relX >= swimmer.width || relX + o.width <= 0);
            const yOv = !(swimmer.y + swimmer.height - 1 < o.y || swimmer.y > o.y + o.height - 1);
            if (xOv && yOv) { stuck = true; break; }
        }

        let bestCand = candidates[0];
        let bestScore = Infinity;

        for (let pass = 0; pass < 2; pass++) {
        bestCand = candidates[0];
        bestScore = Infinity;

        for (const c of candidates) {
            const nx = wrapX(swimmer.x + c.dx);
            const ny = swimmer.y + c.dy;
            if (ny < 0 || ny > maxY) continue;

            const ay1 = ny + swimmer.height - 1;
            let blocked = false;
            let proxPenalty = 0;

            for (const o of allSwimmers) {
                if (o === swimmer) continue;
                let relX = o.x - nx;
                if (relX > cols / 2) relX -= cols;
                if (relX < -cols / 2) relX += cols;
                const xOverlap = !(relX >= swimmer.width || relX + o.width <= 0);
                const yOverlap = !(ay1 < o.y || ny > o.y + o.height - 1);
                if (xOverlap && yOverlap) {
                    if (stuck) {
                        proxPenalty += 200;
                    } else {
                        blocked = true;
                        break;
                    }
                }
                const gapX = Math.max(0, relX - swimmer.width, -(relX + o.width));
                const gapY = Math.max(0, o.y - (ny + swimmer.height), ny - (o.y + o.height));
                const edgeDist = gapX + gapY;
                if (edgeDist < SWIM_PROXIMITY_PAD) proxPenalty += SWIM_PROXIMITY_PAD - edgeDist;
            }
            if (blocked) continue;

            let dxTarget = Math.abs(nx - swimmer.tx);
            dxTarget = Math.min(dxTarget, cols - dxTarget);
            let score = dxTarget + Math.abs(ny - swimmer.ty);
            if (c.dx !== 0 && c.dx === swimmer.dirX) score -= INERTIA_WEIGHT;
            if (c.dy !== 0 && c.dy === swimmer.dirY) score -= INERTIA_WEIGHT;
            score += proxPenalty + Math.random() * 0.5;

            if (score < bestScore) {
                bestScore = score;
                bestCand = c;
            }
        }
        if (bestScore < Infinity) break;
        stuck = true;
        }

        swimmer.x = wrapX(swimmer.x + bestCand.dx);
        swimmer.y = clamp(swimmer.y + bestCand.dy, 0, maxY);
        if (bestCand.dx !== 0) swimmer.dirX = bestCand.dx;
        if (bestCand.dy !== 0) swimmer.dirY = bestCand.dy;
        if (bestCand.dx !== 0) swimmer.goingRight = bestCand.dx > 0;
        renderSwimmer(swimmer);
    }

    function renderPlant(plant) {
        const art = plant.currentState ? plant.stateB : plant.stateA;
        const y = rows - plant.height - plant.yOffset;
        if (plant.shadowEl) {
            const html = artLinesToHtml(art);
            plant.shadowEl.innerHTML = html;
            plant.mainEl.innerHTML = html;

    function renderAllEntities() {
        getSwimmers().forEach(s => {
            s.x = wrapX(s.x);
            s.y = clamp(s.y, 0, Math.max(0, visibleRows - s.height));
            s.tx = clamp(s.tx, 0, Math.max(0, cols - s.width));
            s.ty = clamp(s.ty, 0, Math.max(0, visibleRows - s.height));

        });

        rocks.forEach(renderRock);
        pellets.slice().forEach(p => {
            p.x = clamp(p.x, 0, Math.max(0, cols - p.width));
            p.y = clamp(p.y, 0, Math.max(0, rows - p.height));
            if (p.y >= rows - p.height) {
                removePellet(p);
                return;

            if (pelletTouchesFish(p)) {

    function startWorldLoop() {
        const swimmers = getSwimmers();
        const now = performance.now();
        swimmers.forEach(s => {
            s.nextMoveAtMs = now + Math.random() * SWIMMER_STAGGER_MS;
        });

        function worldTick() {
            const t = performance.now();
            const all = getSwimmers();
            for (const s of all) {
                if (s.isMouseOver) continue;
                if (t >= s.nextMoveAtMs) {
                    moveSwimmer(s);
                    s.nextMoveAtMs = t + scaledDelay(s.speedMs);
                }
            }
            requestAnimationFrame(worldTick);
        }
        requestAnimationFrame(worldTick);
    }

        'fishi time': { action: 'points', amount: 1000000 },
        'breadlover': { action: 'popup', url: breadLoveURL, title: 'bread love' },
        'breadhater': { action: 'popup', url: breadHateURL, title: 'bread hate' },
    };

    function openTerminalPopup() {
        if (terminalOpened) return;
        terminalOpened = true;

        const { popup } = createDraggablePopup('', `
            <div class="modal-header">
                <div class="modal-title">terminal</div>
                <button class="modal-close" type="button">close</button>
            </div>
            <div class="terminal-output" aria-live="polite">enter code:</div>
            <div class="terminal-row">
                <input class="terminal-input" type="text" autocomplete="off" spellcheck="false" aria-label="terminal code" />
                <button class="modal-close" type="button" data-terminal-submit="1">enter</button>
            </div>
        `);

        const outputEl = popup.querySelector('.terminal-output');
        const inputEl = popup.querySelector('input');
        const submitBtn = popup.querySelector('[data-terminal-submit="1"]');

        function handleSubmit() {
            const raw = (inputEl.value || '').trim();
            const code = raw.toLowerCase();

            if (!code) {
                outputEl.textContent = 'enter code:';
                return;
            }

            const entry = TERMINAL_CODES[code];
            if (!entry) {
                outputEl.textContent = 'invalid code';
                inputEl.select();
                return;
            }

            outputEl.textContent = 'accepted';
            inputEl.value = '';

            if (entry.action === 'popup') {
                openEntityPopup(entry.url, entry.title);
            } else if (entry.action === 'points') {
                addFishPoints(entry.amount);
            }
        }

        submitBtn.addEventListener('click', handleSubmit);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSubmit();
            }
        });

        setTimeout(() => {
            try { inputEl.focus(); } catch (_) {}
        }, 0);
    }

    function openSiteMap() {
        siteMapModal.classList.add('is-open');
        siteMapModal.setAttribute('aria-hidden', 'false');
    }

    function closeSiteMap() {
        siteMapModal.classList.remove('is-open');
        siteMapModal.setAttribute('aria-hidden', 'true');
    }

    function openFishGame() {
        const modalEl = fishGameModal.querySelector('.modal');
        if (modalEl) {
            const rect = fishPointsEl.getBoundingClientRect();
            modalEl.style.position = 'fixed';
            modalEl.style.top = rect.top + 'px';
            modalEl.style.left = rect.right + 'px';
            modalEl.style.transform = 'translate(-100%, 0)';
            modalEl.style.margin = '0';
        }
        fishGameModal.classList.add('is-open');
        fishGameModal.setAttribute('aria-hidden', 'false');
    }

    function closeFishGame() {
        const modalEl = fishGameModal.querySelector('.modal');
        if (modalEl) {
            modalEl.style.position = '';
            modalEl.style.top = '';
            modalEl.style.left = '';
            modalEl.style.transform = '';
            modalEl.style.margin = '';
        }
        fishGameModal.classList.remove('is-open');
        fishGameModal.setAttribute('aria-hidden', 'true');
    }

    function updateFishGamePosition() {
        if (!fishGameModal.classList.contains('is-open')) return;
        const modalEl = fishGameModal.querySelector('.modal');
        if (!modalEl) return;
        const rect = fishPointsEl.getBoundingClientRect();
        modalEl.style.top = rect.top + 'px';
        modalEl.style.left = rect.right + 'px';
    }

    siteMapBtn.addEventListener('click', () => {
        if (siteMapModal.classList.contains('is-open')) closeSiteMap();
        else openSiteMap();
    });

    siteMapClose.addEventListener('click', closeSiteMap);

    siteMapModal.addEventListener('click', (e) => {
        if (e.target === siteMapModal) closeSiteMap();
    });

    fishPointsEl.addEventListener('click', () => {
        if (fishGameModal.classList.contains('is-open')) closeFishGame();
        else openFishGame();
    });

    fishGameModal.addEventListener('click', (e) => {
        if (e.target === fishGameModal) closeFishGame();
    });

    window.addEventListener('resize', updateFishGamePosition);

    siteMapChatBtn.addEventListener('click', (e) => {
        e.preventDefault();
        openChatPopup();
        closeSiteMap();
    });

    chatBtn.addEventListener('click', () => {
        openChatPopup();
    });

    const popupsContainer = document.getElementById('entityPopupsContainer');
    const activePopups = [];
    let popupIdCounter = 0;
    let popupStackOffset = 0;

    function createDraggablePopup(extraClass, contentHtml, opts) {
        opts = opts || {};
        const popupId = ++popupIdCounter;
        const offsetX = 12 + (popupStackOffset % 5) * 30;
        const offsetY = 56 + (popupStackOffset % 5) * 30;
        popupStackOffset++;

        const popup = document.createElement('div');
        popup.className = ('modal ' + extraClass + ' entity-popup-window').replace(/\s+/g, ' ').trim();
        popup.setAttribute('role', 'dialog');
        popup.setAttribute('aria-modal', 'true');
        popup.setAttribute('data-popup-id', popupId);
        popup.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        popup.innerHTML = contentHtml;

        popupsContainer.appendChild(popup);

        const header = popup.querySelector('.modal-header');
        const closeBtn = popup.querySelector('.modal-close');

        const state = {
            id: popupId,
            el: popup,
            header,
            dragging: false,
            currentX: offsetX,
            currentY: offsetY,
            startX: 0,
            startY: 0,
            startTransX: 0,
            startTransY: 0
        };

        activePopups.push(state);

        function bringToFront() {
            const maxZ = activePopups.reduce((max, p) => {
                const z = parseInt(getComputedStyle(p.el).zIndex, 10) || 80;
                return Math.max(max, z);
            }, 80);
            popup.style.zIndex = maxZ + 1;
        }

        function closePopup() {
            const idx = activePopups.findIndex(p => p.id === popupId);
            if (idx >= 0) activePopups.splice(idx, 1);
            if (typeof opts.beforeClose === 'function') opts.beforeClose();
            popup.remove();
            if (typeof opts.onClose === 'function') opts.onClose();
        }

        closeBtn.addEventListener('click', closePopup);
        popup.addEventListener('pointerdown', bringToFront);

        function onPointerDown(e) {
            if (e.button != null && e.button !== 0) return;
            if (e.target.closest('button, a, input, textarea, select')) return;
            state.dragging = true;
            popup.classList.add('is-dragging');
            header.setPointerCapture(e.pointerId);
            state.startX = e.clientX;
            state.startY = e.clientY;
            state.startTransX = state.currentX;
            state.startTransY = state.currentY;
            bringToFront();
            e.preventDefault();
        }

        function onPointerMove(e) {
            if (!state.dragging) return;
            const dx = e.clientX - state.startX;
            const dy = e.clientY - state.startY;
            let nextX = state.startTransX + dx;
            let nextY = state.startTransY + dy;
            const maxX = Math.max(0, window.innerWidth - popup.offsetWidth);
            const maxY = Math.max(0, window.innerHeight - popup.offsetHeight);
            nextX = Math.max(0, Math.min(nextX, maxX));
            nextY = Math.max(0, Math.min(nextY, maxY));
            state.currentX = nextX;
            state.currentY = nextY;
            popup.style.transform = `translate(${nextX}px, ${nextY}px)`;
        }

        function onPointerUp(e) {
            if (!state.dragging) return;
            state.dragging = false;
            popup.classList.remove('is-dragging');
            try { header.releasePointerCapture(e.pointerId); } catch (_) {}
        }

        header.addEventListener('pointerdown', onPointerDown);
        header.addEventListener('pointermove', onPointerMove);
        header.addEventListener('pointerup', onPointerUp);
        header.addEventListener('pointercancel', onPointerUp);

        bringToFront();

        return { popup, state, bringToFront, closePopup };
    }

    function openEntityPopup(iframeUrl, title, onClose) {
        const defaultW = Math.min(760, window.innerWidth - 24);
        const defaultH = 450 + 48;
        const { popup } = createDraggablePopup('modal-iframe', `
            <div class="modal-header">
                <div class="modal-title">${escapeHtml(title || 'popup')}</div>
                <button class="modal-close" type="button">close</button>
            </div>
            <iframe
                class="modal-iframe-frame"
                src="${escapeHtml(iframeUrl)}"
                allowtransparency="yes"
                allow="autoplay"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                scrolling="auto"></iframe>
        `, {
            beforeClose: () => {
                const iframe = popup.querySelector('iframe');
                if (iframe) iframe.src = 'about:blank';
            },
            onClose
        });
        popup.style.width = defaultW + 'px';
        popup.style.height = defaultH + 'px';
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeSiteMap();
            closeFishGame();
        }
    });
})();
</script>
